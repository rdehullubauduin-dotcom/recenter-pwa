<!doctype html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/icon-192.png">
<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Recenter.ing">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
  :root { --bg: #ffffff; --fg: #000000; }
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: pan-y;
  }

  body {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  }

  .reader {
    width: 100vw;
    height: 100dvh;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    background: #fff;
  }

  .reader::-webkit-scrollbar { display: none; }

  .page {
    position: relative;
    width: 100%;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    overflow: hidden;
    background: #fff;
  }

  .page img {
    height: 100dvh;
    width: auto;
    max-width: none;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
    display: block;
  }

  .paywall-link {
    position: absolute;
    left: 42%;
    width: 16%;
top: 43%;
height: 20%;
    z-index: 999;
    display: block;
  }

  @supports (height: 100svh) {
    .reader, .page { height: 100svh; }
    .page img { height: 100svh; }
  }

  @media (display-mode: browser) {
    .page img {
      height: 110dvh;
      width: auto;
      max-width: none;
    }
  }
</style>
</head>

<body>
<main class="reader" id="reader" aria-label="Recenter.ing reader"></main>

<script>
  const PAGE_COUNT = 10;
  const PAYWALL_PAGE = 10;
  const STRIPE_LINK = "https://buy.stripe.com/5kQdR8gTScXX1CM9LK28800";

  const reader = document.getElementById('reader');

  for (let i = 1; i <= PAGE_COUNT; i++) {
    const num = String(i).padStart(3, '0');

    const section = document.createElement('section');
    section.className = 'page';
    section.setAttribute('aria-label', `Page ${i}`);

    const img = document.createElement('img');
    img.src = `/pages/${num}PWA.png`;
    img.alt = `Recenter.ing page ${i}`;
    img.loading = i <= 3 ? 'eager' : 'lazy';
    img.decoding = 'async';

    section.appendChild(img);

    if (i === PAYWALL_PAGE) {
      const link = document.createElement('a');
      link.href = STRIPE_LINK;
      link.className = 'paywall-link';
      link.setAttribute('aria-label', 'Enter Recenter.ing full access');
      section.appendChild(link);
    }

    reader.appendChild(section);
  }

  function pageHeight() {
    return window.innerHeight;
  }

  function currentPage() {
    return Math.round(reader.scrollTop / pageHeight());
  }

  function go(delta) {
    const next = Math.min(PAGE_COUNT - 1, Math.max(0, currentPage() + delta));
    reader.scrollTo({ top: next * pageHeight(), behavior: 'smooth' });
  }

  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ' || e.key === 'ArrowRight') go(1);
    if (e.key === 'ArrowUp' || e.key === 'PageUp' || e.key === 'ArrowLeft') go(-1);
  });
</script>
</body>
</html>
