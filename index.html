<!doctype html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Recenter.ing">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style>
    :root { --bg: #ffffff; --fg: #000000; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
      overscroll-behavior: none;
    }
    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .reader {
      width: 100vw;
      height: 100dvh;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      background: #fff;
    }
    .reader::-webkit-scrollbar { display: none; }
    .page {
  width: 100%;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
      justify-content: center;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      overflow: hidden;
      background: #fff;
    }
    .page img {
  height: 100dvh;
  width: auto;
  max-width: none;
  object-fit: contain;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
  display: block;
    }
    @supports (height: 100svh) {
      .reader, .page { height: 100svh; }
      .page img { height: 100svh; }
    }
    @supports (height: 100svh) {
  .reader, .page { height: 100svh; }
  .page img { height: 100svh; }
}

@media (display-mode: browser) {
  .page img {
height: 110dvh;
width: auto;
max-width: none;
  }
}
  </style>
</head>
<body>
  <main class="reader" id="reader" aria-label="Recenter.ing reader"></main>

  <script>
    const PAGE_COUNT = 65;
    const reader = document.getElementById('reader');

    for (let i = 1; i <= PAGE_COUNT; i++) {
      const num = String(i).padStart(3, '0');
      const section = document.createElement('section');
      section.className = 'page';
      section.setAttribute('aria-label', `Page ${i}`);

      const img = document.createElement('img');
      img.src = `/pages/${num}PWA.png`;
      img.alt = `Recenter.ing page ${i}`;
      img.loading = i <= 3 ? 'eager' : 'lazy';
      img.decoding = 'async';

      section.appendChild(img);
      reader.appendChild(section);
    }

    function pageHeight() { return window.innerHeight; }
    function currentPage() { return Math.round(reader.scrollTop / pageHeight()); }
    function go(delta) {
      const next = Math.min(PAGE_COUNT - 1, Math.max(0, currentPage() + delta));
      reader.scrollTo({ top: next * pageHeight(), behavior: 'smooth' });
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ' || e.key === 'ArrowRight') go(1);
      if (e.key === 'ArrowUp' || e.key === 'PageUp' || e.key === 'ArrowLeft') go(-1);
    });

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(registrations => {
    registrations.forEach(registration => registration.unregister());
  });
    }
  </script>
</body>
</html>
