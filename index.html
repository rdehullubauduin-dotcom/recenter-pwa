<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Recenter.ing" />
  <title>Recenter.ing</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    :root { --bg: #ffffff; --fg: #000000; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: pan-x;
    }
    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .reader {
      width: 100vw;
      height: 100dvh;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      background: #fff;
    }
    .reader::-webkit-scrollbar { display: none; }
    .page {
      flex: 0 0 100vw;
      width: 100vw;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
      scroll-snap-stop: always;
      overflow: hidden;
      background: #fff;
    }
    .page img {
      height: 100dvh;
      width: auto;
      max-width: none;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      display: block;
    }
    .hint {
      position: fixed;
      bottom: max(18px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: .08em;
      opacity: .28;
      transition: opacity 900ms ease;
      pointer-events: none;
    }
    .hint.hidden { opacity: 0; }
    @media (min-aspect-ratio: 1080 / 2340) {
      .page img { height: 100dvh; width: auto; }
    }
    @media (max-aspect-ratio: 1080 / 2340) {
      .page img { height: 100dvh; width: auto; }
    }
  </style>
</head>
<body>
  <main class="reader" id="reader" aria-label="Recenter.ing reader"></main>
  <div class="hint" id="hint">swipe</div>

  <script>
    const PAGE_COUNT = 66;
    const reader = document.getElementById('reader');
    const hint = document.getElementById('hint');

    for (let i = 1; i <= PAGE_COUNT; i++) {
      const num = String(i).padStart(3, '0');
      const section = document.createElement('section');
      section.className = 'page';
      section.setAttribute('aria-label', `Page ${i}`);

      const img = document.createElement('img');
      img.src = `/pages/${num}PWA.png`;
      img.alt = `Recenter.ing page ${i}`;
      img.loading = i <= 3 ? 'eager' : 'lazy';
      img.decoding = 'async';

      section.appendChild(img);
      reader.appendChild(section);
    }

    function pageWidth() { return window.innerWidth; }
    function currentPage() { return Math.round(reader.scrollLeft / pageWidth()); }
    function go(delta) {
      const next = Math.min(PAGE_COUNT - 1, Math.max(0, currentPage() + delta));
      reader.scrollTo({ left: next * pageWidth(), behavior: 'smooth' });
      hideHint();
    }
    function hideHint() { hint.classList.add('hidden'); }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') go(1);
      if (e.key === 'ArrowLeft' || e.key === 'PageUp') go(-1);
    });

    let wheelLock = false;
    window.addEventListener('wheel', (e) => {
      if (Math.abs(e.deltaY) < 20 && Math.abs(e.deltaX) < 20) return;
      e.preventDefault();
      if (wheelLock) return;
      wheelLock = true;
      const direction = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
      go(direction > 0 ? 1 : -1);
      setTimeout(() => wheelLock = false, 520);
    }, { passive: false });

    reader.addEventListener('scroll', hideHint, { once: true });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
    }
  </script>
</body>
</html>
